qanal {

  agent {
    # BUG-13 Fix: provide defaults so the app starts cleanly in dev without env vars.
    # In production, always override via AGENT_ID and AGENT_REGION.
    id     = "local-dev"
    id     = ${?AGENT_ID}                    # unique per deployment
    region = "local"
    region = ${?AGENT_REGION}               # e.g. "us-west-2"
  }

  # ── QUIC transport settings ──
  quic {
    host = "0.0.0.0"
    port = ${?QUIC_PORT}
    port = 4433

    # TLS certificates (required for QUIC)
    cert-path = ${?QUIC_CERT_PATH}
    key-path = ${?QUIC_KEY_PATH}

    # Connection tuning
    max-idle-timeout-sec = 30
    initial-max-streams-bidirectional = 64
    initial-max-streams-unidirectional = 128
    initial-max-data = 104857600             # P1 Fix: 100 MB per connection
    initial-max-stream-data = 16777216       # P1 Fix: 16 MB per stream
  }

  # ── Transfer engine settings ──
  transfer {
    parallel-streams = 64                    # P2 Fix: concurrent QUIC streams per transfer
    read-buffer-size = 2097152               # 2 MB — DirectByteBuffer per stream
    write-buffer-size = 2097152
    max-retry-per-chunk = 3
    retry-delay-ms = 1000
  }

  # ── Control Plane connection ──
  control-plane {
    host = ${?CONTROL_PLANE_HOST}
    host = "localhost"
    grpc-port = ${?CONTROL_PLANE_GRPC_PORT}
    grpc-port = 9090
    tls-enabled = false                      # set true in production
    heartbeat-interval-sec = 5
    progress-report-interval-ms = 500
  }

  # ── Netty event loop ──
  netty {
    boss-threads = 1                         # acceptor
    worker-threads = 0                       # 0 = availableProcessors × 2
    use-epoll = true                         # Linux-only, falls back to NIO
  }

  # ── File storage (assembled output + download server) ──
  storage {
    # Where assembled files are stored for download by recipients.
    # Override with QANAL_STORAGE_DIR env var in production.
    output-dir = "/tmp/qanal-storage"
    output-dir = ${?QANAL_STORAGE_DIR}

    # Separate QUIC port for recipient downloads.
    # Convention: quic.port + 1  (default: 4434)
    download-port = 4434
    download-port = ${?QANAL_DOWNLOAD_PORT}
  }

  # ── Metrics ──
  metrics {
    enabled = true
    prometheus-port = 9091
  }
}
