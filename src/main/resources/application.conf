qanal {

  agent {
    id = ${?AGENT_ID}                        # unique per deployment
    region = ${?AGENT_REGION}                # e.g. "us-west-2"
  }

  # ── QUIC transport settings ──
  quic {
    host = "0.0.0.0"
    port = ${?QUIC_PORT}
    port = 4433

    # TLS certificates (required for QUIC)
    cert-path = ${?QUIC_CERT_PATH}
    key-path = ${?QUIC_KEY_PATH}

    # Connection tuning
    max-idle-timeout-sec = 30
    initial-max-streams-bidirectional = 128
    initial-max-streams-unidirectional = 128
    initial-max-data = 10485760              # 10 MB per connection
    initial-max-stream-data = 1048576        # 1 MB per stream
  }

  # ── Transfer engine settings ──
  transfer {
    parallel-streams = 16                    # concurrent QUIC streams per transfer
    read-buffer-size = 2097152               # 2 MB — DirectByteBuffer per stream
    write-buffer-size = 2097152
    max-retry-per-chunk = 3
    retry-delay-ms = 1000
  }

  # ── Control Plane connection ──
  control-plane {
    host = ${?CONTROL_PLANE_HOST}
    host = "localhost"
    grpc-port = ${?CONTROL_PLANE_GRPC_PORT}
    grpc-port = 9090
    heartbeat-interval-sec = 5
    progress-report-interval-ms = 500
  }

  # ── Netty event loop ──
  netty {
    boss-threads = 1                         # acceptor
    worker-threads = 0                       # 0 = availableProcessors × 2
    use-epoll = true                         # Linux-only, falls back to NIO
  }

  # ── Metrics ──
  metrics {
    enabled = true
    prometheus-port = 9091
  }
}
